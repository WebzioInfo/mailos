name: Deploy WEBZIO MAILOS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck || true # Temporary until strictly typed

      - name: Build Next.js App
        run: npm run build

      - name: Build and Push Docker Images
        run: |
          # Normally requires docker login
          # docker build -t webzio/mailos:latest .
          # docker push webzio/mailos:latest
          echo "Docker build skipped in dry-run"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/webzio/mailos
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker exec webzio_mailos_web npx prisma migrate deploy
